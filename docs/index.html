<html lang="en">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .week-navigator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .week-info {
            font-size: 18px;
            font-weight: 600;
            color: #495057;
            flex: 1;
            text-align: center;
            min-width: 250px;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .locations-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 15px;
        }

        .location-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
        }

        .location-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #667eea;
            text-align: center;
        }
        
        .day-card {
            background: white;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-left: 4px solid #667eea;
        }
        
        .day-card.no-shift {
            opacity: 0.5;
            border-left-color: #dee2e6;
        }
        
        .day-card.current-day {
            border-left-width: 6px;
            border-left-color: #28a745;
            background: #f0fff4;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.2);
        }
        
        .day-card.current-day .day-name {
            color: #28a745;
        }
        
        .current-day-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .day-name {
            font-weight: 700;
            font-size: 14px;
            color: #495057;
        }

        .day-date {
            font-size: 13px;
            color: #6c757d;
        }

        .shift-info {
            margin-top: 2px;
        }

        .shift-time {
            font-size: 15px;
            font-weight: 600;
            color: #212529;
            margin-bottom: 2px;
        }
        
        .shift-details {
            font-size: 14px;
            color: #6c757d;
        }
        
        .shift-description {
            font-size: 13px;
            color: #495057;
            margin-top: 4px;
            font-style: italic;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .no-shift-message {
            color: #6c757d;
            font-style: italic;
        }
        
        .empty-week {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 16px;
        }
        
        @media (max-width: 768px) {
            .locations-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .week-navigator {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-buttons {
                width: 100%;
                justify-content: center;
            }
            
            .week-info {
                order: -1;
            }
        }
    </style>
</head>

        });
        
        function getMonday(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }
        
        function formatDate(date) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
        
        function formatDateShort(date) {
            const options = { month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
        
        function getDateString(date) {
            return date.toISOString().split('T')[0];
        }
        
        function isToday(date) {
            const today = new Date();
            return date.getDate() === today.getDate() &&
                   date.getMonth() === today.getMonth() &&
                   date.getFullYear() === today.getFullYear();
        }
        
        function getShiftDisplay(shiftCode) {
            if (!showShiftInfo || !shiftDescriptions[shiftCode]) {
                return `Shift: ${shiftCode}`;
            }
            return `Shift: ${shiftCode} (${shiftDescriptions[shiftCode]})`;
        }
        
        function toggleShiftInfo() {
            showShiftInfo = !showShiftInfo;
            const btn = document.getElementById('shiftInfoBtn');
            btn.textContent = showShiftInfo ? 'Hide Shift Info' : 'Show Shift Info';
            renderSchedule();
        }
        
        function goToCurrentWeek() {
            const today = new Date();
            currentWeekStart = getMonday(today);
            renderSchedule();
        }
        
        function renderSchedule() {
            const monday = getMonday(currentWeekStart);
            const sunday = new Date(monday);
            sunday.setDate(sunday.getDate() + 6);
            
            // Update week info
            document.getElementById('weekInfo').textContent = 
                `${formatDate(monday)} - ${formatDate(sunday)}`;
            
            // Render both locations
            const locations = ['Den Helder', 'Alkmaar'];
            const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            
            let html = '';
            
            locations.forEach(location => {
                html += `
                    <div class="location-section">
                        <div class="location-title">${location}</div>
                        <div class="days-container">
                `;
                
                let hasAnyShifts = false;
                
                for (let i = 0; i < 7; i++) {
                    const date = new Date(monday);
                    date.setDate(date.getDate() + i);
                    const dateStr = getDateString(date);
                    const dayName = daysOfWeek[i];
                    const today = isToday(date);
                    
                    const shift = scheduleByDate[dateStr]?.[location];
                    
                    if (shift) {
                        hasAnyShifts = true;
                        html += `
                            <div class="day-card${today ? ' current-day' : ''}">
                                <div class="day-header">
                                    <div class="day-name">
                                        ${dayName}
                                        ${today ? '<span class="current-day-badge">TODAY</span>' : ''}
                                    </div>
                                    <div class="day-date">${formatDateShort(date)}</div>
                                </div>
                                <div class="shift-info">
                                    <div class="shift-time">${getShiftDisplay(shift.shift)}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="day-card no-shift${today ? ' current-day' : ''}">
                                <div class="day-header">
                                    <div class="day-name">
                                        ${dayName}
                                        ${today ? '<span class="current-day-badge">TODAY</span>' : ''}
                                    </div>
                                    <div class="day-date">${formatDateShort(date)}</div>
                                </div>
                                <div class="no-shift-message">No shift scheduled</div>
                            </div>
                        `;
                    }
                }
                
                if (!hasAnyShifts) {
                    html += '<div class="empty-week">No shifts scheduled for this week</div>';
                }
                
                html += `
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('scheduleContainer').innerHTML = html;
        }
        
        function previousWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() - 7);
            renderSchedule();
        }
        
        function nextWeek() {
            currentWeekStart.setDate(currentWeekStart.getDate() + 7);
            renderSchedule();
        }
        
        // Initial render
        renderSchedule();
    </script>
</body>
</html>
